name: Daily YouTube Scraper

on:
  # Run daily at 09:00 UTC
  schedule:
    - cron: "0 9 * * *"
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-and-summarize:
    runs-on: ubuntu-latest

    # Set up permissions to allow the bot to commit changes back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper Script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: python main.py

      - name: Commit and Push Updated History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json

          # Only commit and push if history.json actually changed during the script run
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update history.json [skip ci]" && git push)
